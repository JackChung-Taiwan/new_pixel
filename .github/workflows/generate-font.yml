name: Generate thin font data

on:
  push:
    paths:
      - "tools/generate_font_data.py"
      - ".github/workflows/generate-font.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: python -m pip install pillow

      - name: Generate font data
        run: python tools/generate_font_data.py

      - name: Commit generated font data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Minecraft_Chinese_Pixel/font-data-*.ts
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Regenerate thin Chinese pixel font data"
            git push
          fi
